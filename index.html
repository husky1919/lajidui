<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>husky1919 Pages 列表</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f6f8fa;
            margin: 0;
            padding: 24px 20px;
            color: #1f2328;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
            overflow: hidden;
            padding: 20px 24px 32px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            margin: 0 0 6px 0;
            border-left: 4px solid #0969da;
            padding-left: 16px;
        }
        .desc {
            color: #57606a;
            border-bottom: 1px solid #eaeef2;
            padding-bottom: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            background: #f9fafb;
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #e9ecef;
        }
        .filter-wrapper {
            flex: 3;
            min-width: 160px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            border-radius: 32px;
            padding: 4px 12px;
            border: 1px solid #ddd;
        }
        .filter-wrapper:focus-within {
            border-color: #0969da;
            box-shadow: 0 0 0 2px rgba(9,105,218,0.2);
        }
        .filter-wrapper label {
            font-size: 0.9rem;
            opacity: 0.6;
        }
        #filter {
            border: none;
            padding: 8px 0;
            font-size: 0.95rem;
            width: 100%;
            background: transparent;
            outline: none;
        }
        .stats-badge {
            background: #eef2f5;
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1f2328;
            white-space: nowrap;
        }
        .repo-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 12px;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .repo-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #eef2f5;
            transition: all 0.15s ease;
        }
        .repo-card:hover {
            background: #fefefe;
            border-color: #d0d7de;
        }
        .repo-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding: 14px 18px;
            text-decoration: none;
            color: inherit;
        }
        .repo-name {
            font-weight: 600;
            font-size: 1.04rem;
            color: #0969da;
            word-break: break-word;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
        }
        .repo-url-hint {
            font-size: 0.75rem;
            color: #57606a;
            font-family: monospace;
            background: #f6f8fa;
            padding: 2px 8px;
            border-radius: 20px;
            max-width: 320px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pages-badge {
            background: #ddf4ff;
            color: #0969da;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 30px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }
        .loading-state, .empty-state, .error-state {
            text-align: center;
            padding: 48px 20px;
            color: #6e7781;
            background: #fafbfc;
            border-radius: 28px;
            margin-top: 12px;
        }
        .error-state {
            background: #fff2f0;
            color: #cf222e;
        }
        .refresh-btn {
            background: none;
            border: 1px solid #cfdde6;
            border-radius: 30px;
            padding: 6px 16px;
            font-size: 0.8rem;
            cursor: pointer;
            background: white;
        }
        .refresh-btn:hover {
            background: #f0f3f6;
            border-color: #0969da;
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 28px;
            color: #8c959f;
            border-top: 1px solid #eef2f5;
            padding-top: 20px;
        }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .container { padding: 16px; }
            .repo-link { flex-direction: column; align-items: flex-start; }
            .repo-url-hint { max-width: 100%; white-space: normal; word-break: break-all; }
            .toolbar { flex-direction: column; align-items: stretch; border-radius: 24px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>husky1919 · GitHub Pages 仓库</h1>
    <div class="desc">
        已启用 GitHub Pages 的仓库列表
    </div>
    <div class="toolbar">
        <div class="filter-wrapper">
            <label>过滤</label>
            <input type="text" id="filter" placeholder="仓库名称" autocomplete="off">
        </div>
        <div class="stats-badge" id="statsLabel">
            等待扫描
        </div>
        <button class="refresh-btn" id="refreshBtn">刷新</button>
    </div>
    <div id="repoList" class="repo-grid">
        <div class="loading-state">
            正在获取仓库列表并检测 Pages 状态
        </div>
    </div>
    <footer>
        仅展示已成功发布 GitHub Pages 的仓库
    </footer>
</div>

<script>
    (function() {
        const USERNAME = 'husky1919';
        const GITHUB_API_REPOS = `https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=updated&type=all`;
        
        const repoContainer = document.getElementById('repoList');
        const filterInput = document.getElementById('filter');
        const statsLabel = document.getElementById('statsLabel');
        const refreshBtn = document.getElementById('refreshBtn');
        
        let allPagesRepos = [];
        let isLoading = false;
        
        function setLoading(loadingMsg = '正在扫描仓库并检测 Pages 状态...') {
            if (isLoading) return;
            isLoading = true;
            repoContainer.innerHTML = `<div class="loading-state">${loadingMsg}</div>`;
            if (statsLabel) statsLabel.textContent = '检测中';
        }
        
        function setError(errMsg) {
            repoContainer.innerHTML = `<div class="error-state">加载失败: ${errMsg}<br><br><button class="refresh-btn" id="retryBtn" style="margin-top:8px;">重试</button></div>`;
            const retryBtn = document.getElementById('retryBtn');
            if (retryBtn) retryBtn.addEventListener('click', () => loadRepositoriesAndPages());
            statsLabel.textContent = '请求失败';
            isLoading = false;
        }
        
        function setEmpty() {
            repoContainer.innerHTML = `<div class="empty-state">未找到任何启用 GitHub Pages 的公开仓库</div>`;
            statsLabel.textContent = '0 个 Pages 仓库';
            isLoading = false;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function buildPagesUrl(repoName) {
            if (repoName === `${USERNAME}.github.io`) {
                return `https://${USERNAME}.github.io/`;
            }
            return `https://${USERNAME}.github.io/${encodeURIComponent(repoName)}/`;
        }
        
        function renderRepoList(filterKeyword = '') {
            if (!allPagesRepos.length) {
                if (!isLoading) setEmpty();
                return;
            }
            
            let filtered = [...allPagesRepos];
            const keyword = filterKeyword.trim().toLowerCase();
            if (keyword !== '') {
                filtered = filtered.filter(repo => repo.name.toLowerCase().includes(keyword));
            }
            
            if (filtered.length === 0) {
                repoContainer.innerHTML = `<div class="empty-state">没有匹配的 Pages 仓库</div>`;
                statsLabel.textContent = `${allPagesRepos.length} 个 Pages 仓库 · 无匹配`;
                return;
            }
            
            const fragment = document.createDocumentFragment();
            filtered.forEach(repo => {
                const card = document.createElement('div');
                card.className = 'repo-card';
                
                const targetUrl = buildPagesUrl(repo.name);
                
                const link = document.createElement('a');
                link.className = 'repo-link';
                link.href = targetUrl;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
                
                const leftDiv = document.createElement('div');
                leftDiv.style.display = 'flex';
                leftDiv.style.flexDirection = 'column';
                leftDiv.style.gap = '6px';
                leftDiv.style.flex = '1';
                
                const nameSpan = document.createElement('div');
                nameSpan.className = 'repo-name';
                nameSpan.textContent = repo.name;
                
                const urlSpan = document.createElement('div');
                urlSpan.className = 'repo-url-hint';
                urlSpan.textContent = targetUrl;
                
                leftDiv.appendChild(nameSpan);
                leftDiv.appendChild(urlSpan);
                
                const badgeSpan = document.createElement('span');
                badgeSpan.className = 'pages-badge';
                badgeSpan.textContent = 'Pages';
                
                const rightWrapper = document.createElement('div');
                rightWrapper.style.display = 'flex';
                rightWrapper.style.alignItems = 'center';
                rightWrapper.style.gap = '12px';
                rightWrapper.appendChild(badgeSpan);
                
                link.appendChild(leftDiv);
                link.appendChild(rightWrapper);
                card.appendChild(link);
                fragment.appendChild(card);
            });
            
            repoContainer.innerHTML = '';
            repoContainer.appendChild(fragment);
            statsLabel.textContent = `${filtered.length} / ${allPagesRepos.length} 个 Pages 仓库`;
            isLoading = false;
        }
        
        async function loadRepositoriesAndPages() {
            allPagesRepos = [];
            isLoading = true;
            setLoading('正在获取仓库并检测 Pages 配置...');
            
            try {
                const reposResponse = await fetch(GITHUB_API_REPOS, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!reposResponse.ok) {
                    let errDetail = `HTTP ${reposResponse.status}`;
                    if (reposResponse.status === 403) {
                        errDetail = 'API 速率限制超出 (60次/小时) 或需要认证。请稍后再试。';
                    } else if (reposResponse.status === 404) {
                        errDetail = `用户 "${USERNAME}" 不存在`;
                    }
                    throw new Error(errDetail);
                }
                
                const repos = await reposResponse.json();
                if (!Array.isArray(repos) || repos.length === 0) {
                    setEmpty();
                    isLoading = false;
                    return;
                }
                
                const publicRepos = repos.filter(repo => !repo.private);
                const totalRepos = publicRepos.length;
                statsLabel.textContent = `检测中 (0/${totalRepos})`;
                
                repoContainer.innerHTML = `<div class="loading-state">正在检测 ${totalRepos} 个仓库的 Pages 状态...</div>`;
                
                const BATCH_SIZE = 5;
                const results = [];
                for (let i = 0; i < publicRepos.length; i += BATCH_SIZE) {
                    const batch = publicRepos.slice(i, i + BATCH_SIZE);
                    const batchPromises = batch.map(async (repo) => {
                        const pagesApiUrl = `https://api.github.com/repos/${USERNAME}/${repo.name}/pages`;
                        try {
                            const pagesRes = await fetch(pagesApiUrl, {
                                headers: { 'Accept': 'application/vnd.github.v3+json' }
                            });
                            if (pagesRes.status === 200) {
                                const pagesData = await pagesRes.json();
                                if (pagesData && (pagesData.html_url || pagesData.url)) {
                                    return {
                                        name: repo.name,
                                        enabled: true
                                    };
                                } else {
                                    return { name: repo.name, enabled: true };
                                }
                            } else {
                                return { name: repo.name, enabled: false };
                            }
                        } catch (err) {
                            console.warn(`检测仓库 ${repo.name} Pages失败`, err);
                            return { name: repo.name, enabled: false };
                        }
                    });
                    const batchResults = await Promise.all(batchPromises);
                    results.push(...batchResults);
                    const processed = Math.min(i + BATCH_SIZE, totalRepos);
                    statsLabel.textContent = `检测中 (${processed}/${totalRepos})`;
                }
                
                const enabledRepos = [];
                for (const res of results) {
                    if (res && res.enabled === true) {
                        enabledRepos.push({
                            name: res.name
                        });
                    }
                }
                
                enabledRepos.sort((a,b) => a.name.localeCompare(b.name));
                allPagesRepos = enabledRepos;
                
                if (allPagesRepos.length === 0) {
                    setEmpty();
                    isLoading = false;
                    return;
                }
                
                renderRepoList(filterInput.value);
                isLoading = false;
                
            } catch (err) {
                console.error(err);
                setError(err.message || '网络错误或GitHub API异常');
                isLoading = false;
            }
        }
        
        let debounceTimer;
        function onFilterInput() {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                if (!isLoading) {
                    renderRepoList(filterInput.value);
                } else {
                    const waitForLoad = setInterval(() => {
                        if (!isLoading) {
                            clearInterval(waitForLoad);
                            renderRepoList(filterInput.value);
                        }
                    }, 200);
                    setTimeout(() => clearInterval(waitForLoad), 5000);
                }
            }, 200);
        }
        
        function handleRefresh() {
            if (isLoading) return;
            loadRepositoriesAndPages().catch(() => {});
        }
        
        filterInput.addEventListener('input', onFilterInput);
        refreshBtn.addEventListener('click', handleRefresh);
        
        loadRepositoriesAndPages();
    })();
</script>
</body>
</html>
