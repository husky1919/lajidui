<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>文件浏览器</title>
</head>
<body>
    <p>说明：JS和WASM目录下的是MC移植网页版，biliplus开头的不用理</p>
    <div>
        <button id="backBtn" style="display:none;" onclick="goBack()">⬅ 返回上级</button>
        <span id="currentPath">当前位置：/</span>
    </div>
    <input type="text" id="filter" placeholder="筛选" onkeyup="filterList()">
    <div id="fileList">正在加载…</div>

    <script>
        // 配置
        const REPO_OWNER = "husky1919";
        const REPO_NAME = "husky1919.github.io";
        const BRANCH = "main";

        // 全局数据
        let allItems = [];        // 所有文件和目录的完整路径列表
        let currentPath = "";     // 当前浏览的目录路径（相对于仓库根目录，空字符串表示根）
        let currentEntries = [];   // 当前目录下的直接子项（文件夹+文件）

        // 获取仓库所有文件/目录的原始数据（递归树）
        async function fetchAllItems() {
            const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${BRANCH}?recursive=1`;
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                // 过滤掉 index.html 和 biliplus 开头的文件（不显示）
                allItems = data.tree.filter(item => {
                    const fileName = item.path.split('/').pop();
                    return item.path !== 'index.html' && !fileName.startsWith('biliplus');
                });
                // 开始浏览根目录
                navigateTo("");
            } catch (err) {
                document.getElementById('fileList').innerHTML = `加载失败：${err.message}`;
            }
        }

        // 导航到指定目录（纯前端更新，不跳转页面）
        function navigateTo(path) {
            currentPath = path;
            // 更新界面上的路径显示
            const pathDisplay = currentPath === "" ? "/" : "/" + currentPath + "/";
            document.getElementById('currentPath').innerText = "当前位置：" + pathDisplay;
            // 控制返回按钮的显示
            document.getElementById('backBtn').style.display = currentPath === "" ? "none" : "inline-block";

            // 找出当前目录下的直接子项（文件夹和文件）
            const entries = new Map();  // 用 Map 避免重复添加相同名称的文件夹

            for (const item of allItems) {
                const fullPath = item.path;
                // 如果不是在当前目录下，跳过
                if (currentPath !== "") {
                    if (!fullPath.startsWith(currentPath + "/")) continue;
                }

                // 获取相对路径（相对于当前目录）
                let relativePath;
                if (currentPath === "") {
                    relativePath = fullPath;
                } else {
                    relativePath = fullPath.substring(currentPath.length + 1);
                }

                // 如果还有斜杠，说明是子目录中的内容，只取第一段作为目录名
                if (relativePath.includes("/")) {
                    const dirName = relativePath.split("/")[0];
                    if (!entries.has(dirName)) {
                        entries.set(dirName, { type: "dir", name: dirName, fullPath: currentPath === "" ? dirName : currentPath + "/" + dirName });
                    }
                } else {
                    // 当前目录下的文件
                    entries.set(relativePath, { type: "file", name: relativePath, fullPath: fullPath });
                }
            }

            // 转为数组并排序：文件夹在前，文件在后，按名称排序
            let entryList = Array.from(entries.values());
            entryList.sort((a, b) => {
                if (a.type !== b.type) {
                    return a.type === "dir" ? -1 : 1;
                }
                return a.name.localeCompare(b.name);
            });

            currentEntries = entryList;
            renderFileList();
        }

        // 渲染当前目录下的文件和文件夹
        function renderFileList() {
            const container = document.getElementById('fileList');
            if (currentEntries.length === 0) {
                container.innerHTML = "📭 此文件夹为空";
                return;
            }

            let html = "";
            for (const entry of currentEntries) {
                if (entry.type === "dir") {
                    // 文件夹：使用 span 绑定点击事件，绝对不产生跳转
                    html += `<div><span style="cursor:pointer;color:#0000EE;text-decoration:underline;" onclick="navigateTo('${escapePath(entry.fullPath)}')">📁 ${entry.name}</span></div>`;
                } else {
                    // 文件：用正常的超链接，在新标签页打开（符合预期）
                    html += `<div><a href="${entry.fullPath}" target="_blank">📄 ${entry.name}</a></div>`;
                }
            }
            container.innerHTML = html;

            // 如果存在筛选关键词，重新应用筛选
            const keyword = document.getElementById('filter').value.trim().toLowerCase();
            if (keyword) applyFilter(keyword);
        }

        // 返回上级目录
        function goBack() {
            if (currentPath === "") return;
            const lastSlash = currentPath.lastIndexOf("/");
            const parentPath = lastSlash === -1 ? "" : currentPath.substring(0, lastSlash);
            navigateTo(parentPath);
        }

        // 辅助函数：转义路径中的单引号，避免 onclick 语法错误
        function escapePath(path) {
            return path.replace(/'/g, "\\'");
        }

        // 筛选功能（基于当前渲染的 DOM 元素）
        function filterList() {
            const keyword = document.getElementById('filter').value.trim().toLowerCase();
            applyFilter(keyword);
        }

        function applyFilter(keyword) {
            const items = document.querySelectorAll('#fileList > div');
            if (keyword === "") {
                for (let i = 0; i < items.length; i++) {
                    items[i].style.display = "";
                }
                return;
            }
            for (let i = 0; i < items.length; i++) {
                const text = items[i].innerText.toLowerCase();
                if (text.includes(keyword)) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        // 启动
        fetchAllItems();
    </script>
</body>
</html>
