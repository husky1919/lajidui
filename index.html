<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>文件列表</title>
</head>
<body>
    <p>说明：JS和WASM目录下的是MC移植网页版，biliplus开头的不用理</p>
    <input type="text" id="filter" placeholder="筛选" onkeyup="filterList()">
    <div id="fileList">正在扫描...</div>

    <script>
        const REPO_OWNER = "husky1919";
        const REPO_NAME = "husky1919.github.io";
        const BRANCH = "main";

        async function fetchHtmlFiles() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${BRANCH}?recursive=1`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                // 过滤：只要.html文件，排除index.html，排除biliplus开头的文件
                const htmlFiles = data.tree.filter(item => {
                    const fileName = item.path.split('/').pop(); // 获取文件名部分
                    return item.path.endsWith('.html') && 
                           item.path !== 'index.html' &&
                           !fileName.startsWith('biliplus');
                });
                displayList(htmlFiles.map(f => f.path));
            } catch (err) {
                document.getElementById('fileList').innerHTML = '获取失败：' + err.message;
            }
        }

        function displayList(files) {
            const container = document.getElementById('fileList');
            if (files.length === 0) {
                container.innerHTML = '没有找到其他 .html 文件';
                return;
            }
            container.innerHTML = files.map(file => '<a href="' + file + '" target="_blank">' + file + '</a><br>').join('');
        }

        function filterList() {
            const keyword = document.getElementById('filter').value.toLowerCase();
            const links = document.querySelectorAll('#fileList a');
            for (let i = 0; i < links.length; i++) {
                const link = links[i];
                if (link.textContent.toLowerCase().indexOf(keyword) !== -1) {
                    link.style.display = '';
                } else {
                    link.style.display = 'none';
                }
            }
        }

        fetchHtmlFiles();
    </script>
</body>
</html>
