<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>文件浏览器 - 无跳转版</title>
</head>
<body>
    <p>说明：JS和WASM目录下的是MC移植网页版，biliplus开头的不用理</p>
    <div>
        <button id="backBtn" style="display:none;">⬅ 返回上级</button>
        <span id="currentPath">当前位置：/</span>
    </div>
    <input type="text" id="filter" placeholder="筛选" onkeyup="filterList()">
    <div id="fileList">正在加载…</div>

    <script>
        // ---------- 配置 ----------
        const REPO_OWNER = "husky1919";
        const REPO_NAME = "husky1919.github.io";
        const BRANCH = "main";

        // ---------- 全局状态 ----------
        let allItems = [];        // 所有文件/目录的原始数据
        let currentPath = "";     // 当前浏览的相对路径，空为根
        let currentEntries = [];   // 当前目录下的条目 { type, name, fullPath }

        // ---------- 获取仓库文件树 ----------
        async function fetchAllItems() {
            const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${BRANCH}?recursive=1`;
            try {
                const res = await fetch(apiUrl);
                const data = await res.json();
                // 过滤掉 index.html 和 biliplus 开头的文件（不显示）
                allItems = data.tree.filter(item => {
                    const fileName = item.path.split('/').pop();
                    return item.path !== 'index.html' && !fileName.startsWith('biliplus');
                });
                navigateTo("");
            } catch (err) {
                document.getElementById('fileList').innerHTML = `加载失败：${err.message}`;
            }
        }

        // ---------- 导航核心：绝对不产生跳转 ----------
        function navigateTo(path) {
            currentPath = path;
            // 更新界面路径显示
            const displayPath = currentPath === "" ? "/" : "/" + currentPath + "/";
            document.getElementById('currentPath').innerText = "当前位置：" + displayPath;
            // 返回按钮显示逻辑
            const backBtn = document.getElementById('backBtn');
            backBtn.style.display = currentPath === "" ? "none" : "inline-block";

            // 解析当前目录下的直接子项
            const entriesMap = new Map();  // key: 名称, value: 条目对象

            for (const item of allItems) {
                const fullPath = item.path;
                // 判断是否在当前目录下
                if (currentPath !== "") {
                    if (!fullPath.startsWith(currentPath + "/")) continue;
                }

                // 相对路径（相对于当前目录）
                let relative = currentPath === "" ? fullPath : fullPath.substring(currentPath.length + 1);

                // 如果还包含 '/'，说明是更深层的目录，只取第一段作为目录名
                if (relative.includes("/")) {
                    const dirName = relative.split("/")[0];
                    if (!entriesMap.has(dirName)) {
                        entriesMap.set(dirName, {
                            type: "dir",
                            name: dirName,
                            fullPath: currentPath === "" ? dirName : currentPath + "/" + dirName
                        });
                    }
                } else {
                    // 文件
                    entriesMap.set(relative, {
                        type: "file",
                        name: relative,
                        fullPath: fullPath
                    });
                }
            }

            // 排序：文件夹在前，文件在后，按名字排序
            let entries = Array.from(entriesMap.values());
            entries.sort((a, b) => {
                if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
                return a.name.localeCompare(b.name);
            });

            currentEntries = entries;
            renderFileList();
        }

        // ---------- 渲染当前视图 ----------
        function renderFileList() {
            const container = document.getElementById('fileList');
            if (currentEntries.length === 0) {
                container.innerHTML = "📭 此文件夹为空";
                return;
            }

            // 构建 DOM，文件夹使用 data-* 属性 + 监听器，而不是 onclick 字符串
            container.innerHTML = "";
            for (const entry of currentEntries) {
                const div = document.createElement("div");
                if (entry.type === "dir") {
                    const span = document.createElement("span");
                    span.textContent = "📁 " + entry.name;
                    span.style.cursor = "pointer";
                    span.style.color = "#0000EE";
                    span.style.textDecoration = "underline";
                    span.setAttribute("data-path", entry.fullPath);
                    span.classList.add("folder-link");
                    div.appendChild(span);
                } else {
                    const a = document.createElement("a");
                    a.textContent = "📄 " + entry.name;
                    a.href = entry.fullPath;
                    a.target = "_blank";
                    div.appendChild(a);
                }
                container.appendChild(div);
            }

            // 重新绑定文件夹点击事件（确保无跳转）
            const folders = document.querySelectorAll(".folder-link");
            folders.forEach(folder => {
                folder.removeEventListener("click", folderClickHandler);
                folder.addEventListener("click", folderClickHandler);
            });

            // 如果存在筛选关键词，重新应用筛选
            const keyword = document.getElementById('filter').value.trim().toLowerCase();
            if (keyword) applyFilter(keyword);
        }

        // 文件夹点击处理函数（核心：绝对不跳转）
        function folderClickHandler(event) {
            event.preventDefault();
            event.stopPropagation();
            const path = this.getAttribute("data-path");
            if (path) {
                navigateTo(path);
            }
            return false;
        }

        // 返回上级
        function goBack() {
            if (currentPath === "") return;
            const lastSlash = currentPath.lastIndexOf("/");
            const parentPath = lastSlash === -1 ? "" : currentPath.substring(0, lastSlash);
            navigateTo(parentPath);
        }

        // 筛选功能
        function filterList() {
            const keyword = document.getElementById('filter').value.trim().toLowerCase();
            applyFilter(keyword);
        }

        function applyFilter(keyword) {
            const container = document.getElementById('fileList');
            const children = container.children;
            if (keyword === "") {
                for (let i = 0; i < children.length; i++) {
                    children[i].style.display = "";
                }
                return;
            }
            for (let i = 0; i < children.length; i++) {
                const text = children[i].innerText.toLowerCase();
                children[i].style.display = text.includes(keyword) ? "" : "none";
            }
        }

        // ---------- 事件绑定 ----------
        document.getElementById("backBtn").addEventListener("click", goBack);
        // 注意：filter 的 onkeyup 已经写在 HTML 里，也可以保留

        // 启动
        fetchAllItems();
    </script>
</body>
</html>
